<!DOCTYPE html>

<html>

<head>
   <style>
    body{
      background-color: #ffe6eb;
      font-family: Caveat, cursive;
      margin: 0;
      padding: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card{
      background-color: #ffffff;
      max-width: 700px;
      width: 85%;
      padding: 30px;
      border-radius: 20px;

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }


    .ja-button, .nein-button {
      background-color: #d11a5b;
      color: white;
      font-family:'Playfair Display', serif;
      font-size: 18px;
      font-weight: bold;

      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      cursor: pointer;

      margin-top: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.3s ease, transform 0.2s ease;
    }


    h1{
      color: #d11a5b;
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      margin-top: 0;
      text-align: center;
    }

    p{
      color: #4a4a4a;
      font-size: 40px;
      line-height: 1.4;
      margin-bottom: 0;
    }

    .ja-button:active {
      background-color: #940f3c;
      transform: scale(0.92);
    }

    .nein-button:active {
      background-color: #475569;
      transform: scale(0.92);
    }

  </style>
</head>

<body>
  <div class="card">
    <h1>Hallo Schatz! &#10084;&#65039</h1>
    <p> Willst du mit mir auf ein Date gehen?</p>

    <button id= "jaBtn" class="ja-button">
      <b1> Jaaaaaa </b1>
    </button>

    <button id= "neinBtn" class="nein-button">
      <b2> nein danke</b2>
    </button>
  </div>

  <script>

    const jaButton = document.getElementById('jaBtn');
    const neinButton = document.getElementById('neinBtn');

    let aktuelleGroeße = 18;

    neinButton.addEventListener('click', function(){

      if (aktuelleGroeße < 130)
      {
        aktuelleGroeße = aktuelleGroeße + 10;

        jaButton.style.fontSize = aktuelleGroeße + "px ";
        jaButton.style.padding = (aktuelleGroeße * 0.6) + "px " + (aktuelleGroeße * 1.3) + "px";
      }

      if (aktuelleGroeße >= 100)
      {
        neinButton.style.display = "none";
      }
    });

  </script>
</body>
</html>
